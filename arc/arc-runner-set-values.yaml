# To be used with STATIC arc-runner configuration
template:
  spec:
    terminationGracePeriodSeconds: 0
    # Only if Karpenter is enabled
    # nodeSelector:
    #   karpenter.sh/nodepool: general-large
    initContainers:
    - name: dagger-cli
      image: alpine:3
      command:
        - sh
        - -o
        - pipefail
        - -exc
        - |-
          # sleep infinity
          apk add curl
          if [ ! -f $BIN_DIR/dagger ]
          then
            if ! curl --fail --silent --show-error https://dl.dagger.io/dagger/install.sh | sh; then
              echo "Dagger CLI install failed"
              exit 1
            fi
            $BIN_DIR/dagger version
          fi
      env:
        - name: BIN_DIR
          value: /opt/dagger/bin
        - name: DAGGER_VERSION
          value: 0.19.6
      volumeMounts:
        - name: dagger-cli
          mountPath: /opt/dagger/bin
    containers:
    - name: runner
      image: ghcr.io/actions/actions-runner:latest
      command:
        - bash
        - -exc
        - |-
          sudo cp /opt/dagger/bin/dagger /bin/dagger
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends git-core curl
          sudo rm -rf /var/lib/apt/lists/*
          exec /home/runner/run.sh
      env:
        - name: _EXPERIMENTAL_DAGGER_RUNNER_HOST
          value: unix:///var/run/dagger/engine.sock
      volumeMounts:
        - name: dagger-cli
          mountPath: /opt/dagger/bin
        - name: dagger-engine
          mountPath: /var/run/dagger
    volumes:
    - name: dagger-cli
      emptyDir: {}
    # Dagger engine installed from Helm Dagger Helm chart is configured 
    # to use hostPath for run volume
    - name: dagger-engine
      hostPath:
        path: /var/run/dagger-dagger-engine-dagger-helm