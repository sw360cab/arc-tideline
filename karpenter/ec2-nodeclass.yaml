apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: sw360cab-nodeclass
spec:
  amiSelectorTerms:
    - alias: bottlerocket@latest
  role: KarpenterNodeRole-custom_ci-cluster 
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: custom_ci-cluster
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: custom_ci-cluster
