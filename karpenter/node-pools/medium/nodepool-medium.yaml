apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: spot-medium
spec:
  template:
    metadata:
      labels:
        type: karpenter
    spec:
      # Reference Karpenter Node Class
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name:  sw360cab-nodeclass
      # intanciable Nodes requirements
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot","on-demand"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["t", "m"]
        - key: karpenter.k8s.aws/instance-size
          operator: In
          values: ["small","medium"]
        - key: "karpenter.k8s.aws/instance-generation" # Filter out older instance types
          operator: Gt
          values: ["2"]
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
      expireAfter: 6h
      terminationGracePeriod: 5m
  limits:
    cpu: "1000"
    memory: 2000Gi
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 30m
    budgets:
    - nodes: "20%" # reduce disruption during weekdays
      schedule: "0 8 * * 1-5"
      duration: 10h
    - nodes: "50%"
      reasons:
      - "Empty"
      - "Underutilized"