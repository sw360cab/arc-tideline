apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: xlarge-nodepool
spec:
  template:
    metadata:
      labels:
        type: karpenter
        dagger.sh/engine: "true"
    spec:
      # Reference Karpenter Node Class
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name:  sw360cab-nodeclass
      # intanciable Nodes requirements
      requirements:
        - key: karpenter.sh/capacity-type # Default on-demand
          operator: In
          values: ["on-demand"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["c", "r"]
        - key: karpenter.k8s.aws/instance-size
          operator: In
          values: ["2xlarge", "4xlarge"]
        - key: "karpenter.k8s.aws/instance-generation"
          operator: Gt
          values: ["5"]
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
      expireAfter: 3h
      terminationGracePeriod: 20m
  limits:
    cpu: "1000"
    memory: 2000Gi
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 10m
    budgets:
    - nodes: "80%"
      reasons:
      - "Empty"
      - "Underutilized"